name: Build miaomiaowu ipk (all archs)

on:
  workflow_dispatch:
    inputs:
      mmw_ref:
        description: '要构建的 miaomiaowu 源码 tag/branch/commit'
        required: true
        default: 'main'
      version:
        description: 'ipk 包版本号'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [arm64, armv7, armv6, armv5, amd64, x86, riscv64]
    steps:
      - name: Checkout 打包仓库（本仓库）
        uses: actions/checkout@v4
        with:
          path: pkg-repo

      - name: Checkout miaomiaowu 源码
        uses: actions/checkout@v4
        with:
          repository: iluobei/miaomiaowu
          ref: ${{ github.event.inputs.mmw_ref || 'main' }}
          path: miaomiaowu-src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 构建前端
        working-directory: miaomiaowu-src/miaomiaowu
        run: |
          npm ci
          npm run build

      - name: 交叉编译后端
        working-directory: miaomiaowu-src
        run: |
          source "$GITHUB_WORKSPACE/pkg-repo/scripts/arch-map.sh"
          IFS=',' read -r GOOS_V GOARCH_V GOARM_V GOMIPS_V <<< "${GO_TARGETS[${{ matrix.target }}]}"

          export CGO_ENABLED=0
          export GOOS="$GOOS_V"
          export GOARCH="$GOARCH_V"
          [ "$GOARM_V" != "-" ] && export GOARM="$GOARM_V"
          [ "$GOMIPS_V" != "-" ] && export GOMIPS="$GOMIPS_V"

          echo "编译目标: GOOS=$GOOS GOARCH=$GOARCH GOARM=${GOARM:-} GOMIPS=${GOMIPS:-}"
          go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/mmw-bin" ./cmd/server

      - name: 为该 go-target 覆盖的所有 opkg 架构打包 ipk
        run: |
          cd pkg-repo
          chmod +x scripts/build-ipk.sh
          source scripts/arch-map.sh

          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"

          for OPKG_ARCH in ${OPKG_ARCHES[${{ matrix.target }}]}; do
            ./scripts/build-ipk.sh "$GITHUB_WORKSPACE/mmw-bin" "$OPKG_ARCH" "$VERSION" "$GITHUB_WORKSPACE/dist"
          done

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.target }}
          path: dist/*.ipk

  build-luci:
    name: Build luci-app-miaomiaowu (arch=all)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 打包仓库
        uses: actions/checkout@v4

      - name: 打包 LuCI 前端 ipk
        run: |
          chmod +x scripts/build-luci-ipk.sh
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          ./scripts/build-luci-ipk.sh "$VERSION" "$GITHUB_WORKSPACE/dist"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-luci-all
          path: dist/*.ipk

  release:
    name: 汇总并发布
    needs: [build, build-luci]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-ipks
          merge-multiple: true

      - name: 生成 Packages 索引和校验和
        run: |
          cd all-ipks
          sha256sum *.ipk > checksums.txt
          ls -la

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            all-ipks/*.ipk
            all-ipks/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-repo:
    name: 生成并发布 ipk 软件源
    needs: [build, build-luci]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-ipks
          merge-multiple: true

      - name: 下载 OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: 生成软件源索引并签名
        run: |
          chmod +x scripts/build-ipk-repo.sh
          echo "${{ secrets.MMW_IPK_SIGN_KEY }}" > /tmp/mmw-ipk-sign.key
          USIGN_BIN=$(find openwrt-sdk -type f -name usign -path "*/host/bin/*" | head -n1)
          ./scripts/build-ipk-repo.sh all-ipks site \
            "$GITHUB_WORKSPACE/openwrt-sdk/scripts/ipkg-make-index.sh" \
            "$GITHUB_WORKSPACE/$USIGN_BIN" /tmp/mmw-ipk-sign.key
          shred -u /tmp/mmw-ipk-sign.key 2>/dev/null || rm -f /tmp/mmw-ipk-sign.key

      - name: 拷贝公钥和 install.sh
        run: |
          cp keys/miaomiaowu-ipk.pub site/miaomiaowu-ipk.pub
          cp scripts/install.sh site/install.sh

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: miaomiaowu-openwrt
          directory: site
          branch: main
